name: Build Mod

on:
  push:
    branches: [main, master]
    tags: ['v*'] # <-- Triggers the release when you push a version tag
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Locate and Parse info.json
        id: info
        run: |
          # 1. Dynamically locate info.json anywhere in the repository
          INFO_PATH=$(find . -name "info.json" -not -path "*/build/*" -not -path "*/.git/*" | head -n 1)
          
          if [ -z "$INFO_PATH" ]; then
            echo "❌ Error: info.json not found anywhere in the repository!"
            exit 1
          fi
          
          # 2. Get the actual folder containing the mod files
          MOD_ROOT=$(dirname "$INFO_PATH")
          echo "Found mod root at: $MOD_ROOT"
          echo "mod_root=$MOD_ROOT" >> "$GITHUB_OUTPUT"

          # 3. Parse info.json data
          mod_name=$(jq -r '.name' "$INFO_PATH")
          mod_version_raw=$(jq -r '.version' "$INFO_PATH")
          
          if [ -z "$mod_name" ] || [ "$mod_name" = "null" ] || [ -z "$mod_version_raw" ] || [ "$mod_version_raw" = "null" ]; then
            echo "❌ Error: Failed to parse 'name' or 'version' from $INFO_PATH"
            exit 1
          fi
          
          mod_version="${mod_name}_${mod_version_raw}"
          echo "mod_version=$mod_version" >> "$GITHUB_OUTPUT"
          echo "zip_name=${mod_version}.zip" >> "$GITHUB_OUTPUT"

      - name: Build isolated archive structure
        run: |
          mod_version="${{ steps.info.outputs.mod_version }}"
          mod_root="${{ steps.info.outputs.mod_root }}"
          
          mkdir -p "build/$mod_version"
          
          # Sync files from the detected mod folder instead of repo root
          rsync -a \
            --exclude='.git*' \
            --exclude='.DS_Store' \
            --exclude='__MACOSX' \
            --exclude='build' \
            "$mod_root/" "build/$mod_version/"

      - name: Zip mod
        run: |
          zip_name="${{ steps.info.outputs.zip_name }}"
          mod_version="${{ steps.info.outputs.mod_version }}"
          
          cd build && \
          zip -r "$zip_name" "$mod_version" \
            -x "*.DS_Store" \
            -x "__MACOSX*" \
            -x "*/images/*"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.info.outputs.zip_name }}
          path: build/${{ steps.info.outputs.zip_name }}

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/') # <-- Only runs when you push a git tag
        uses: softprops/action-gh-release@v2
        with:
          files: build/${{ steps.info.outputs.zip_name }}
          generate_release_notes: true